baseURL = "https://supatagsschau.jwais.com/"
languageCode = "zh-tw"
title = "每日德語"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "每天用 tagesschau 德語新聞學德文，AI 自動產生逐字稿、翻譯和 CEFR 分級學習內容"
  author = "每日德語"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowShareButtons = false
  ShowCodeCopyButtons = false
  disableSpecial1stPost = true

  [params.profileMode]
    enabled = true
    title = "每日德語"
    subtitle = "每天自動擷取 tagesschau 20 Uhr 新聞 Podcast，透過 AI 產生德語逐字稿、繁中翻譯和 CEFR 分級學習內容。"

    [[params.profileMode.buttons]]
      name = "🟢 A1 入門"
      url = "/levels/a1/"
    [[params.profileMode.buttons]]
      name = "🟡 A2 初級"
      url = "/levels/a2/"
    [[params.profileMode.buttons]]
      name = "🔴 B1 中級"
      url = "/levels/b1/"
    [[params.profileMode.buttons]]
      name = "📰 所有文章"
      url = "/archives/"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[taxonomies]
  tag = "tags"
  level = "levels"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  name = "首頁"
  url = "/"
  weight = 1

[[menu.main]]
  name = "標籤"
  url = "/tags/"
  weight = 2
