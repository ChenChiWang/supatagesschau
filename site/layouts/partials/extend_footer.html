{{/* 導覽列：home 換 SVG icon + theme toggle 移到 menu */}}
<script>
(function() {
    var menu = document.getElementById('menu');
    if (!menu) return;

    // home emoji 換成 SVG icon
    var links = menu.querySelectorAll('a');
    for (var i = 0; i < links.length; i++) {
        var span = links[i].querySelector('span');
        if (span && span.textContent.trim() === '🏠') {
            span.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 11 12 3 21 11"/><line x1="5" y1="10" x2="5" y2="21"/><line x1="19" y1="10" x2="19" y2="21"/><line x1="5" y1="21" x2="19" y2="21"/><line x1="10" y1="21" x2="10" y2="15"/><line x1="14" y1="21" x2="14" y2="15"/><line x1="10" y1="15" x2="14" y2="15"/></svg>';
            break;
        }
    }

    // theme toggle 搬到 menu
    var toggle = document.getElementById('theme-toggle');
    if (toggle) {
        var li = document.createElement('li');
        li.appendChild(toggle);
        menu.appendChild(li);
    }
})();
</script>
