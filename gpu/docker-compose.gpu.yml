# DGX Spark (GB10) — Ollama + Whisper + Cloudflare Tunnel
# GB10 使用統一記憶體架構（UMA），需要特殊的 ulimit / shm / ipc 設定

services:
  ollama:
    image: ollama/ollama:0.18.2
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - gpu-network

  whisper:
    image: mekopa/whisperx-blackwell:latest
    container_name: whisper
    ports:
      - "9000:8003"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - gpu-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - gpu-network
    depends_on:
      - ollama

  # 啟動後自動載入模型到 GPU，確保不會 fallback 到 CPU
  ollama-preload:
    image: curlimages/curl:latest
    container_name: ollama-preload
    depends_on:
      - ollama
    restart: "no"
    networks:
      - gpu-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "等待 Ollama 啟動..."
        until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do
          sleep 2
        done
        echo "Ollama 已就緒，開始預載模型..."
        echo "載入 qwen3.5:27b..."
        curl -sf http://ollama:11434/api/chat -d '{"model":"qwen3.5:27b","messages":[{"role":"user","content":"hi"}],"options":{"num_predict":1},"think":false}'
        echo ""
        echo "載入 qwen3.5:35b..."
        curl -sf http://ollama:11434/api/chat -d '{"model":"qwen3.5:35b","messages":[{"role":"user","content":"hi"}],"options":{"num_predict":1},"think":false}'
        echo ""
        echo "模型預載完成"

volumes:
  ollama_data:

networks:
  gpu-network:
    driver: bridge
